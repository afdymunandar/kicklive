<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>KickLiveC</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: #0a0a0f;
      border-bottom: 1px solid #1e1e2e;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo img {
      height: 52px;
      width: auto;
      display: block;
    }

    /* ── MAIN CONTAINER ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* ── VIDEO PLAYER ── */
    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e1e2e;
      margin-bottom: 24px;
    }
    .player-wrap iframe, .player-wrap video {
      width: 100%; height: 100%; border: none; display: block;
    }
    .player-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: #555; font-size: 0.9rem;
    }

    /* ── VIDEO GRID (4x2 = 8 per page) ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ff3e3e;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 4px; height: 16px;
      background: #ff3e3e;
      border-radius: 2px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .video-card {
      background: #151520;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #1e1e2e;
    }
    .video-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(255,62,62,0.15);
      border-color: #ff3e3e40;
    }
    .video-card .thumb-wrap {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .video-card .thumb-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.3s;
    }
    .video-card:hover .thumb-wrap img { transform: scale(1.05); }
    .video-card .play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.3);
      opacity: 0; transition: opacity 0.2s;
    }
    .video-card:hover .play-overlay { opacity: 1; }
    .play-overlay span {
      width: 44px; height: 44px;
      background: #ff3e3e;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .video-card .v-title {
      padding: 10px 12px;
      font-size: 0.78rem;
      font-weight: 500;
      color: #ddd;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── PAGINATION ── */
    .pagination {
      display: flex; justify-content: center; gap: 6px;
      margin: 20px 0 40px;
      flex-wrap: wrap;
    }
    .page-btn {
      background: #151520;
      border: 1px solid #2a2a3e;
      color: #888;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      min-width: 36px;
    }
    .page-btn:hover { background: #1e1e2e; color: #fff; }
    .page-btn.active {
      background: #ff3e3e;
      border-color: #ff3e3e;
      color: #fff;
    }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-btn.dots {
      background: transparent;
      border: none;
      cursor: default;
      color: #555;
    }
    .page-btn.dots:hover { background: transparent; color: #555; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: #1e1e2e;
      margin: 32px 0;
    }

    /* ── COSPLAYER SECTION ── */
    .cosplayer-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ff3e3e;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .cosplayer-label::before {
      content: '';
      width: 4px; height: 16px;
      background: #ff3e3e;
      border-radius: 2px;
    }

    /* ── ALBUM GRID (6x2 = 12 per page) ── */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .album-card {
      background: #151520;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #1e1e2e;
    }
    .album-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(255,62,62,0.15);
      border-color: #ff3e3e40;
    }
    .album-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .album-card:hover img { transform: scale(1.05); }
    .album-card .a-title {
      padding: 10px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #ddd;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── ALBUM DETAIL FULL PAGE (overlay) ── */
    #album-detail-page {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      z-index: 200;
      overflow-y: auto;
      padding: 20px;
    }
    .detail-header {
      max-width: 1200px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e1e2e;
    }
    .detail-header .back-btn {
      background: #151520;
      border: 1px solid #2a2a3e;
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .detail-header .back-btn:hover { background: #ff3e3e; border-color: #ff3e3e; }
    .detail-header .detail-title-wrap {
      flex: 1;
    }
    .detail-header .detail-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
    .detail-header .detail-meta {
      font-size: 0.8rem;
      color: #888;
    }
    .detail-content {
      max-width: 1200px;
      margin: 0 auto;
    }
    .photo-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .photo-list img {
      width: 100%;
      max-width: 100%;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      border: 1px solid #1e1e2e;
      display: block;
    }
    .photo-list img:hover {
      transform: scale(1.01);
      border-color: #ff3e3e40;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      justify-content: center; align-items: center;
      z-index: 999;
    }
    #lightbox.active { display: flex; }
    #lightbox img {
      max-width: 95vw; max-height: 95vh;
      border-radius: 8px;
    }
    #lightbox-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 1.8rem; cursor: pointer; color: #fff;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    /* ── LOADING / EMPTY ── */
    .loading {
      text-align: center; padding: 60px; color: #555; font-size: 0.9rem;
    }
    .empty {
      text-align: center; padding: 40px; color: #555; font-size: 0.85rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .album-grid { grid-template-columns: repeat(4, 1fr); }
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .album-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .video-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .container { padding: 12px; }
      .logo img { height: 44px; }
      #album-detail-page { padding: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="https://i.ibb.co.com/Hpknsb4N/Background-Eraser-20260626-155133253.png" alt="KickLiveC">
  </div>
</header>

<div class="container">

  <!-- ═══════ VIDEO SECTION ═══════ -->
  <div id="video-section">
    <div class="player-wrap" id="player-wrap">
      <div class="player-placeholder">Pilih video dari daftar di bawah</div>
    </div>

    <div class="section-title">Pilihan Video</div>
    <div class="video-grid" id="video-grid"></div>
    <div class="pagination" id="video-pagination"></div>
  </div>

  <div class="divider"></div>

  <!-- ═══════ COSPLAYER SECTION ═══════ -->
  <div id="cosplay-section">
    <div id="cosplay-list">
      <div class="cosplayer-label">COSPLAYER</div>
      <div class="album-grid" id="album-grid"></div>
      <div class="pagination" id="album-pagination"></div>
    </div>
  </div>

</div>

<!-- ═══════ ALBUM DETAIL FULL PAGE (overlay) ═══════ -->
<div id="album-detail-page">
  <div class="detail-header">
    <button class="back-btn" onclick="closeAlbumDetail()">← Kembali</button>
    <div class="detail-title-wrap">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
  </div>
  <div class="detail-content">
    <div class="photo-list" id="photo-list"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox(event)">
  <span id="lightbox-close" onclick="closeLightbox(event)">✕</span>
  <img id="lightbox-img" src="" />
</div>

<script>
  // ═══════════════════════════════════════
  //  KONFIGURASI
  // ═══════════════════════════════════════
  const SUPABASE_URL = 'https://yqssyapqimokatdduydj.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlxc3N5YXBxaW1va2F0ZGR1eWRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjYzNzMsImV4cCI6MjA5Nzk0MjM3M30.k0UN5wBKjm50qha3GD0M2dKGxYbjfcXZEoH4O5GFvMM'
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

  const DATA_JSON_URL = 'data.json'

  // ═══════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════
  let videos = []
  let albums = []
  let totalAlbums = 0
  let videoPage = 1
  let albumPage = 1
  const VIDEOS_PER_PAGE = 8
  const ALBUMS_PER_PAGE = 12

  // ═══════════════════════════════════════
  //  PAGINATION HELPER
  // ═══════════════════════════════════════
  function getPageNumbers(current, total) {
    const pages = []
    if (total <= 7) {
      for (let i = 1; i <= total; i++) pages.push(i)
    } else {
      pages.push(1)
      if (current > 3) pages.push('...')
      const start = Math.max(2, current - 1)
      const end = Math.min(total - 1, current + 1)
      for (let i = start; i <= end; i++) pages.push(i)
      if (current < total - 2) pages.push('...')
      pages.push(total)
    }
    return pages
  }

  // ═══════════════════════════════════════
  //  VIDEO SECTION
  // ═══════════════════════════════════════
  async function loadVideos() {
    const grid = document.getElementById('video-grid')
    grid.innerHTML = '<div class="loading">Memuat video...</div>'
    try {
      const res = await fetch(DATA_JSON_URL)
      videos = await res.json()
      renderVideos()
    } catch (e) {
      grid.innerHTML = '<div class="empty">Gagal memuat data.json. Pastikan file tersedia.</div>'
      console.error(e)
    }
  }

  function renderVideos() {
    const grid = document.getElementById('video-grid')
    const start = (videoPage - 1) * VIDEOS_PER_PAGE
    const pageVideos = videos.slice(start, start + VIDEOS_PER_PAGE)

    grid.innerHTML = pageVideos.map((v, i) => `
      <div class="video-card" onclick="playVideo(${start + i})">
        <div class="thumb-wrap">
          <img src="${v.thumbnail}" loading="lazy" onerror="this.src='https://placehold.co/320x180/1a1a2e/555?text=No+Thumb'">
          <div class="play-overlay"><span>▶</span></div>
        </div>
        <div class="v-title">${v.title}</div>
      </div>
    `).join('')

    renderVideoPagination()
  }

  function renderVideoPagination() {
    const total = Math.ceil(videos.length / VIDEOS_PER_PAGE)
    const wrap = document.getElementById('video-pagination')
    if (total <= 1) { wrap.innerHTML = ''; return }

    const pages = getPageNumbers(videoPage, total)
    let html = `<button class="page-btn" onclick="changeVideoPage(${videoPage - 1})" ${videoPage === 1 ? 'disabled' : ''}>←</button>`
    pages.forEach(p => {
      if (p === '...') {
        html += `<span class="page-btn dots">...</span>`
      } else {
        html += `<button class="page-btn ${p === videoPage ? 'active' : ''}" onclick="changeVideoPage(${p})">${p}</button>`
      }
    })
    html += `<button class="page-btn" onclick="changeVideoPage(${videoPage + 1})" ${videoPage === total ? 'disabled' : ''}>→</button>`
    wrap.innerHTML = html
  }

  function changeVideoPage(p) {
    const total = Math.ceil(videos.length / VIDEOS_PER_PAGE)
    if (p < 1 || p > total) return
    videoPage = p
    renderVideos()
    document.getElementById('player-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' })
  }

  function playVideo(index) {
    const v = videos[index]
    if (!v) return
    const wrap = document.getElementById('player-wrap')
    wrap.innerHTML = `<iframe src="${v.embed_url}" allowfullscreen allow="autoplay; fullscreen" referrerpolicy="no-referrer"></iframe>`
  }

  // ═══════════════════════════════════════
  //  COSPLAY SECTION (SUPABASE SERVER-SIDE)
  // ═══════════════════════════════════════
  async function loadAlbumCount() {
    const { count, error } = await db
      .from('albums')
      .select('*', { count: 'exact', head: true })
    if (error) {
      console.error('Count error:', error)
      return
    }
    totalAlbums = count || 0
    console.log('Total albums:', totalAlbums)
  }

  async function loadAlbums() {
    const grid = document.getElementById('album-grid')
    grid.innerHTML = '<div class="loading">Memuat album...</div>'

    const start = (albumPage - 1) * ALBUMS_PER_PAGE
    const end = start + ALBUMS_PER_PAGE - 1

    const { data, error } = await db
      .from('albums')
      .select('id, title, cosplayer_name, cover_url')
      .order('id', { ascending: false })
      .range(start, end)

    if (error) {
      grid.innerHTML = '<div class="empty">Error: ' + error.message + '</div>'
      console.error(error)
      return
    }

    albums = data
    renderAlbums()
  }

  function renderAlbums() {
    const grid = document.getElementById('album-grid')

    grid.innerHTML = albums.map(a => `
      <div class="album-card" onclick="openAlbumDetail(${a.id})">
        <img src="${a.cover_url}" loading="lazy" onerror="this.src='https://placehold.co/200x267/1a1a2e/555?text=No+Image'">
        <div class="a-title">${a.title}</div>
      </div>
    `).join('')

    renderAlbumPagination()
  }

  function renderAlbumPagination() {
    const total = Math.ceil(totalAlbums / ALBUMS_PER_PAGE)
    const wrap = document.getElementById('album-pagination')
    if (total <= 1) { wrap.innerHTML = ''; return }

    const pages = getPageNumbers(albumPage, total)
    let html = `<button class="page-btn" onclick="changeAlbumPage(${albumPage - 1})" ${albumPage === 1 ? 'disabled' : ''}>←</button>`
    pages.forEach(p => {
      if (p === '...') {
        html += `<span class="page-btn dots">...</span>`
      } else {
        html += `<button class="page-btn ${p === albumPage ? 'active' : ''}" onclick="changeAlbumPage(${p})">${p}</button>`
      }
    })
    html += `<button class="page-btn" onclick="changeAlbumPage(${albumPage + 1})" ${albumPage === total ? 'disabled' : ''}>→</button>`
    wrap.innerHTML = html
  }

  function changeAlbumPage(p) {
    const total = Math.ceil(totalAlbums / ALBUMS_PER_PAGE)
    if (p < 1 || p > total) return
    albumPage = p
    loadAlbums()
    document.getElementById('cosplay-section').scrollIntoView({ behavior: 'smooth', block: 'start' })
  }

  // ═══════════════════════════════════════
  //  ALBUM DETAIL FULL PAGE
  // ═══════════════════════════════════════
  async function openAlbumDetail(albumId) {
    const album = albums.find(a => a.id === albumId)
    if (!album) return

    document.getElementById('detail-title').textContent = album.title
    document.getElementById('detail-meta').textContent = album.cosplayer_name || ''

    const list = document.getElementById('photo-list')
    list.innerHTML = '<div class="loading">Memuat foto...</div>'

    document.getElementById('album-detail-page').style.display = 'block'
    document.body.style.overflow = 'hidden'
    window.scrollTo(0, 0)

    const { data, error } = await db
      .from('photos')
      .select('id, photo_url')
      .eq('album_id', albumId)
      .order('id', { ascending: true })

    if (error) {
      list.innerHTML = '<div class="empty">Error: ' + error.message + '</div>'
      return
    }

    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">Tidak ada foto dalam album ini.</div>'
      return
    }

    list.innerHTML = data.map(p => `
      <img src="${p.photo_url}" loading="lazy" onclick="openLightbox('${p.photo_url}')" onerror="this.style.display='none'">
    `).join('')
  }

  function closeAlbumDetail() {
    document.getElementById('album-detail-page').style.display = 'none'
    document.body.style.overflow = 'auto'
  }

  // ═══════════════════════════════════════
  //  LIGHTBOX
  // ═══════════════════════════════════════
  function openLightbox(url) {
    document.getElementById('lightbox-img').src = url
    document.getElementById('lightbox').classList.add('active')
  }
  function closeLightbox(e) {
    if (e.target.id === 'lightbox' || e.target.id === 'lightbox-close') {
      document.getElementById('lightbox').classList.remove('active')
    }
  }

  // ═══════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════
  loadVideos()
  loadAlbumCount().then(() => loadAlbums())
</script>

</body>
</html>
